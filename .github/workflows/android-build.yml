name: Build Android Signed Assets

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_id:
        description: 'ID of the build record in Supabase'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Signing Secrets
        run: |
          MISSING_SECRETS=()
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then MISSING_SECRETS+=("ANDROID_KEYSTORE_BASE64"); fi
          if [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then MISSING_SECRETS+=("ANDROID_KEY_ALIAS"); fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then MISSING_SECRETS+=("ANDROID_KEYSTORE_PASSWORD"); fi
          if [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then MISSING_SECRETS+=("ANDROID_KEY_PASSWORD"); fi
          
          if [ ${#MISSING_SECRETS[@]} -ne 0 ]; then
            echo "❌ CRITICAL ERROR: Missing required signing secrets: ${MISSING_SECRETS[*]}"
            echo "Please configure them in GitHub Actions secrets."
            exit 1
          fi
          echo "✅ All signing secrets are present."

      - name: Calculate Versioning
        id: versioning
        run: |
          VERSION_NAME=$(git describe --tags --always || echo "1.0.${{ github.run_number }}")
          VERSION_CODE=$((1000 + ${{ github.run_number }}))
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "🔢 Build Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('flutter/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: |
          cd flutter
          
          # Retry mechanism for pub get
          for i in {1..3}; do
            flutter pub get && break || sleep 10
          done

      - name: Debug Info & Gradle Warmup
        run: |
          echo "--- Versions Report ---"
          echo "Flutter: $(flutter --version | head -n 1)"
          echo "Java: $(java -version 2>&1 | head -n 1)"
          
          # Tentativa robusta de encontrar o path do Flutter
          FLUTTER_ROOT_PATH=$(flutter doctor -v | grep -i "Flutter SDK at" | sed 's/.*at \(.*\)/\1/' | xargs echo || echo "$FLUTTER_ROOT")
          echo "Flutter SDK Path: $FLUTTER_ROOT_PATH"
          
          echo "--- Project Structure ---"
          ls -R flutter/android
          
          # Garantir que local.properties existe em flutter/android
          cd flutter/android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          if [ -n "$FLUTTER_ROOT_PATH" ]; then
            echo "flutter.sdk=$FLUTTER_ROOT_PATH" >> local.properties
          fi
          echo "--- local.properties ---"
          cat local.properties
          
          echo "--- Validating Gradle Wrapper ---"
          if [ ! -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "❌ ERROR: gradle-wrapper.properties not found!"
            exit 1
          fi
          
          chmod +x gradlew
          # Gradle warmup opcional, ignoramos erro se falhar apenas no warmup
          ./gradlew help --no-daemon --stacktrace || echo "Gradle warmup failed, attempting build anyway..."


      - name: Build Flutter App
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.internal.http.connectionTimeout=120000 -Dorg.gradle.internal.http.socketTimeout=120000"
          ORG_GRADLE_PROJECT_VERSION_CODE: ${{ env.VERSION_CODE }}
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ env.VERSION_NAME }}
        run: |
          cd flutter
          
          # Re-verify local.properties
          if [ ! -f "android/local.properties" ]; then
            echo "sdk.dir=$ANDROID_HOME" > android/local.properties
            # Try to get path again safely
            SAFE_FLUTTER_PATH=$(flutter doctor -v | grep "Flutter SDK at" | awk '{print $4}' || echo "")
            if [ -n "$SAFE_FLUTTER_PATH" ]; then
              echo "flutter.sdk=$SAFE_FLUTTER_PATH" >> android/local.properties
            fi
          fi


          
          # Build APK
          flutter build apk --release --verbose \
            --build-number=${{ env.VERSION_CODE }} \
            --build-name=${{ env.VERSION_NAME }} \
            --no-pub
            
          # Build App Bundle
          flutter build appbundle --release --verbose \
            --build-number=${{ env.VERSION_CODE }} \
            --build-name=${{ env.VERSION_NAME }} \
            --no-pub

      - name: Verify Build Artifacts
        run: |
          echo "Verificando existência dos artefatos de build..."
          APK_PATH="flutter/build/app/outputs/flutter-apk/app-release.apk"
          AAB_PATH="flutter/build/app/outputs/bundle/release/app-release.aab"
          
          # Listando conteúdo para depuração antes da verificação
          echo "Conteúdo da pasta de outputs:"
          ls -R flutter/build/app/outputs/ || echo "Diretório de outputs não encontrado"
          
          FAILED=0
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ ERRO: APK não encontrado em: $APK_PATH"
            FAILED=1
          else
            echo "✅ APK encontrado: $APK_PATH"
          fi
          
          if [ ! -f "$AAB_PATH" ]; then
            echo "❌ ERRO: AAB não encontrado em: $AAB_PATH"
            FAILED=1
          else
            echo "✅ AAB encontrado: $AAB_PATH"
          fi
          
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: flutter/build/app/outputs/flutter-apk
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: flutter/build/app/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Prepare Final Files
        run: |
          mkdir -p aplicativo
          if [ -f "${{ steps.sign_apk.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" aplicativo/BuildsApp-Signed.apk
          else
            cp flutter/build/app/outputs/flutter-apk/app-release.apk aplicativo/BuildsApp-Signed.apk || true
          fi
          
          if [ -f "${{ steps.sign_aab.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign_aab.outputs.signedReleaseFile }}" aplicativo/BuildsApp-Signed.aab
          else
            cp flutter/build/app/outputs/bundle/release/app-release.aab aplicativo/BuildsApp-Signed.aab || true
          fi

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_NAME }}
          name: Release ${{ env.VERSION_NAME }}
          files: |
            aplicativo/BuildsApp-Signed.apk
            aplicativo/BuildsApp-Signed.aab
          body: "Nova versão ${{ env.VERSION_NAME }} (${{ env.VERSION_CODE }}) gerada automaticamente."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-assets-${{ env.VERSION_NAME }}
          path: aplicativo/
          retention-days: 7

      - name: Notify Dashboard Success
        if: success()
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/notify-build-complete" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"version\": \"${{ env.VERSION_NAME }}\",
            \"status\": \"success\",
            \"github_run_id\": \"${{ github.run_id }}\",
            \"build_id\": \"${{ github.event.inputs.build_id }}\"
          }"
        continue-on-error: true

      - name: Notify Dashboard Failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/notify-build-complete" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"version\": \"${{ env.VERSION_NAME }}\",
            \"status\": \"error\",
            \"github_run_id\": \"${{ github.run_id }}\",
            \"error_message\": \"Build failed in GitHub Actions. Check logs at https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }"
        continue-on-error: true
