name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          
      - name: Get Dependencies
        run: cd flutter && flutter pub get

      - name: Decode Upload Keystore
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > flutter/android/app/upload.keystore.jks

      - name: Build AAB (Play Store)
        run: |
          cd flutter
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}
        env:
          STORE_PASSWORD: ${{ secrets.UPLOAD_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
          KEY_ALIAS: "upload-key"
          STORE_FILE: "upload.keystore.jks"

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release-aab
          path: flutter/build/app/outputs/bundle/release/app-release.aab
